<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yükleniyor</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(190, 35, 55, 0.35), transparent 42%),
          linear-gradient(145deg, #2c0b10 0%, #130405 55%, #050505 100%);
        color: #fff7ef;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .card {
        width: 84%;
        max-width: 560px;
        padding: 42px 44px;
        border: 1px solid rgba(255, 214, 184, 0.18);
        border-radius: 28px;
        background: rgba(10, 4, 5, 0.74);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      .eyebrow {
        margin-bottom: 14px;
        font-size: 14px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: #ffc98e;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 40px;
      }
      p {
        margin: 0 0 28px;
        font-size: 18px;
        color: #f4dfd1;
      }
      .bar {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.09);
      }
      .bar > span {
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #ffd46f, #b0172e, #ff8452);
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes loading {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="eyebrow">İzmir Katip Çelebi Üniversitesi</div>
      <h1>Kültür ve Turizm Topluluğu</h1>
      <p>Stand yarışması hazırlanıyor...</p>
      <div class="bar"><span></span></div>
    </section>
  </body>
</html>
